<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#101014">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Chi Tiêu — Quản lý tài chính cá nhân</title>
<style>
:root{
  --bg:#101014; --card:#1b1b22; --card2:#26262f; --ink:#f2f2f5; --ink2:#9d9da8; --ink3:#63636e;
  --line:#2b2b34; --blue:#4f8ef7; --blue-bg:#1c2a44; --green:#34c77b; --green-bg:#15311f;
  --red:#ff6b6b; --red-bg:#3a1c1c; --amber:#f5b942; --accent:#4f8ef7;
  --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.screen{flex:1;padding:18px 16px 96px;overflow-y:auto}
h1{font-size:20px;font-weight:700}
h2{font-size:15px;font-weight:600;color:var(--ink);margin:22px 0 10px}
.muted{color:var(--ink2);font-size:13px}
.tiny{color:var(--ink3);font-size:12px}
.card{background:var(--card);border-radius:20px;padding:16px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
.btn{display:block;width:100%;padding:15px;border-radius:var(--r);background:var(--blue);color:#fff;font-size:16px;font-weight:600;text-align:center}
.btn:disabled{opacity:.35}
.btn-ghost{background:var(--card);color:var(--ink)}
input[type=text],input[type=tel],input[type=number],input[type=date],select{font:inherit;width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);-webkit-appearance:none;color-scheme:dark}
input:focus,select:focus{outline:2px solid var(--blue);outline-offset:-1px}
.mng{font-size:12px;color:var(--blue);font-weight:600;padding:4px 0 4px 10px;white-space:nowrap}
.back{font-size:22px;padding:0 10px 2px 0;color:var(--ink2)}
.pos{color:var(--green)}.neg{color:var(--red)}
/* greeting */
.greet .hi{font-size:14px;color:var(--ink2)}
.greet .nm{font-size:24px;font-weight:800;margin:2px 0 8px}
.ava{width:44px;height:44px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--blue);font-size:16px}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.badge2{font-size:12px;font-weight:600;padding:5px 11px;border-radius:99px}
.badge2.ok{background:var(--green-bg);color:var(--green)}
.badge2.warn{background:var(--red-bg);color:var(--red)}
.badge2.zap{background:#332a12;color:var(--amber)}
/* pills & tabs */
.ptabs{display:flex;background:var(--card);border-radius:99px;padding:4px;gap:4px;margin-bottom:12px}
.ptabs button{flex:1;padding:9px 0;border-radius:99px;font-size:13px;font-weight:600;color:var(--ink2)}
.ptabs button.on{background:var(--blue);color:#fff}
.ptabs.sm{display:inline-flex;margin:0}
.ptabs.sm button{flex:none;padding:7px 16px}
.iconbtn{width:38px;height:38px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink2)}
.fchips{display:flex;gap:8px;overflow-x:auto;margin:12px 0;padding-bottom:2px}
.fchips button{white-space:nowrap;background:var(--card);border-radius:99px;padding:8px 15px;font-size:13px;font-weight:600;color:var(--ink2)}
.fchips button.on{background:var(--blue);color:#fff}
/* chi/thu cards */
.ct2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ct{background:var(--card);border-radius:18px;padding:13px 14px;display:flex;align-items:center;gap:10px}
.ct.hl{border:1px solid var(--red)}
.ct .ic2{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.ct .ic2.ex{background:var(--red);color:#fff}
.ct .ic2.in{background:var(--green);color:#08130c}
.ct .v{font-size:17px;font-weight:800}
.ct .l{font-size:12px;color:var(--ink2)}
.sts{margin-top:10px;background:var(--card);border-radius:12px;padding:10px 13px;font-size:13px;color:var(--ink2)}
.sts b{color:var(--ink)}
/* balance card (Sổ) */
.balcard{background:var(--card);border-radius:24px;padding:18px 16px;text-align:center}
.mnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
.mnav button{width:34px;height:34px;border-radius:50%;background:var(--card2);color:var(--blue);font-size:16px}
.mnav button:disabled{opacity:.3}
.mnav span{font-size:15px;font-weight:700}
.balcard .lbl{font-size:13px;color:var(--ink2)}
.balcard .total{font-size:36px;font-weight:800;letter-spacing:-.5px;margin:6px 0 12px}
.inex{display:flex;border-top:1px solid var(--line);padding-top:12px}
.inex>div{flex:1}
.inex .v{font-size:16px;font-weight:700;margin-top:2px}
.acts{display:flex;gap:10px;margin:14px 0 4px}
.acts button{flex:1;padding:14px;border-radius:16px;font-size:15px;font-weight:700;color:#fff}
.acts .tf{background:var(--blue)}
.acts .aa{background:var(--green);color:#08130c}
.acc{background:var(--card);border-radius:18px;padding:13px 14px;display:flex;align-items:center;gap:12px;margin-bottom:9px}
.acc .ico{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.acc .n{font-weight:700;font-size:15px}
.acc .b{font-size:13px;font-weight:600;margin-top:2px}
/* calendar */
.cal{background:var(--card);border-radius:20px;padding:14px}
.cal .chead{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;color:var(--ink3);margin-bottom:6px}
.cal .cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cday{aspect-ratio:1;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;color:var(--ink2);position:relative;background:var(--card2)}
.cday.blank{background:none}
.cday.today{color:var(--blue);font-weight:800}
.cday.sel{background:var(--blue);color:#fff}
.cday .dot{width:5px;height:5px;border-radius:50%;position:absolute;bottom:5px}
/* jars */
.jar{background:var(--card);border-radius:16px;padding:13px 14px;margin-bottom:9px}
.jar .top{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px}
.jar .nm{font-weight:500}
.bar{height:7px;background:var(--card2);border-radius:4px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:4px}
.catline{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);margin-top:7px}
/* nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(27,27,34,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
.nav button{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px;color:var(--ink3);padding:4px 10px;min-width:56px}
.nav button.on{color:var(--blue);font-weight:600}
.nav .ic{font-size:21px;line-height:1}
.nav .fab{width:52px;height:52px;border-radius:50%;background:var(--blue);color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;margin-top:-24px;box-shadow:0 4px 14px rgba(79,142,247,.4)}
/* add flow */
.photostep{flex:1;display:flex;flex-direction:column;padding:18px 16px 30px}
.photostep .opts{flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px}
.bigopt{display:block;background:var(--card);border-radius:20px;padding:22px;text-align:center;font-size:17px;font-weight:700}
.bigopt.cam{background:var(--blue);color:#fff}
.skip{text-align:center;color:var(--ink2);font-size:15px;padding:14px}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:9px 16px;font-size:14px;font-weight:600;position:relative}
.pill.sel{border-color:var(--blue);color:var(--blue)}
.photo{position:relative;border-radius:24px;overflow:hidden;background:linear-gradient(160deg,#23232c,#17171d);min-height:170px;margin-bottom:12px}
.photo img.bgimg{width:100%;max-height:280px;object-fit:cover;display:block}
.pov{position:absolute;left:0;right:0;bottom:0;padding:14px;background:rgba(16,16,20,.55);backdrop-filter:blur(6px)}
.photo.nophoto .pov{position:static;background:none;padding:26px 14px}
.bigamt{font-size:36px;font-weight:800;text-align:center;letter-spacing:-.5px}
.bigamt .d{font-size:20px;font-weight:600;color:var(--ink2)}
.pov input{margin-top:10px;background:rgba(38,38,47,.8);border:none;text-align:center}
.chipsrow{display:flex;justify-content:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.toggle{display:flex;background:var(--card);border-radius:99px;padding:4px;gap:4px}
.toggle button{padding:8px 18px;border-radius:99px;font-size:14px;font-weight:700;color:var(--ink2)}
.toggle button.ex{background:var(--red);color:#fff}
.toggle button.in{background:var(--green);color:#08130c}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.pad button{background:var(--card);border-radius:14px;font-size:22px;font-weight:600;padding:13px 0}
.pad button:active{background:var(--card2)}
.saverow{display:flex;gap:10px;align-items:center}
.savebtn{width:62px;height:62px;border-radius:50%;background:var(--green);color:#08130c;font-size:26px;font-weight:800;flex-shrink:0}
.savebtn:disabled{opacity:.35}
/* sheets */
.sheetbg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:90}
.sheet{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;background:var(--card);border-radius:22px 22px 0 0;padding:18px 16px calc(22px + env(safe-area-inset-bottom));z-index:91;max-height:70vh;overflow-y:auto}
.sheet h2{margin-top:0}
.srowa{display:flex;align-items:center;gap:12px;padding:12px 8px;border-radius:14px}
.srowa.sel{background:var(--card2)}
/* rows */
.day{margin-bottom:16px}
.day .dh{display:flex;justify-content:space-between;font-size:13px;color:var(--ink2);margin-bottom:6px;padding:0 2px}
.tx{background:var(--card);border-radius:14px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:7px}
.tx .ico{font-size:20px}
.tx .n{font-size:14px;font-weight:500}
.tx .s{font-size:12px;color:var(--ink3)}
.tx .a{font-weight:700;font-size:14px;white-space:nowrap}
.tx .del{color:var(--ink3);font-size:16px;padding:6px}
.tx.done .n,.tx.done .a{text-decoration:line-through;color:var(--ink3)}
.paybtn{background:var(--blue-bg);color:var(--blue);font-size:13px;font-weight:700;padding:8px 14px;border-radius:99px}
.thumb{width:42px;height:42px;border-radius:10px;object-fit:cover;flex-shrink:0}
.imgview{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.imgview img{max-width:92vw;max-height:74vh;border-radius:14px}
.imgview .pill{background:var(--card)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.chip{background:var(--card2);border:1.5px solid transparent;border-radius:99px;padding:8px 15px;font-size:13px}
.chip.sel{border-color:var(--blue);color:var(--blue);font-weight:700}
/* charts */
.cmp{display:flex;align-items:flex-end;gap:10px;height:130px;margin-top:8px}
.cmp .g{flex:1;text-align:center}
.cmp .bars{display:flex;gap:3px;align-items:flex-end;justify-content:center;height:96px}
.cmp .bi{width:12px;border-radius:4px 4px 0 0;background:var(--green)}
.cmp .be{width:12px;border-radius:4px 4px 0 0;background:var(--red)}
/* onboarding + settings */
.ob{padding:34px 22px 24px;flex:1;display:flex;flex-direction:column}
.ob h1{font-size:24px;margin-bottom:6px}
.fw{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:11px;text-align:left;width:100%}
.fw.sel{border-color:var(--blue);background:var(--blue-bg)}
.fw .n{font-weight:700;font-size:16px}
.fw .badge{display:inline-block;font-size:11px;font-weight:700;background:var(--blue);color:#fff;padding:2px 9px;border-radius:99px;margin-left:8px;vertical-align:2px}
.fw .d{font-size:13px;color:var(--ink2);margin-top:3px}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.srow input.pct{width:64px;text-align:center;padding:10px 6px}
.srow input.nm{flex:1}
.srow input.ic{width:52px;text-align:center;padding:10px 4px}
.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:#f2f2f5;color:#111;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.show{opacity:1}
.center{text-align:center}
.mt{margin-top:14px}.mb{margin-bottom:14px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
"use strict";
const LS = "chitieu_v1";
const ACC_COLORS = ["#34c77b","#4f8ef7","#f5b942","#b06ef7","#ff6b6b","#3ecfd4"];
const FW = [
  {id:"s70", name:"70 / 20 / 10", min:0, desc:"Thu nhập vừa đủ chi tiêu — ưu tiên xây quỹ dự phòng trước.",
   jars:[{name:"Thiết yếu",icon:"🏠",pct:70,save:false},{name:"Dự phòng",icon:"🛡️",pct:20,save:true},{name:"Cá nhân",icon:"🎈",pct:10,save:false}]},
  {id:"s50", name:"50 / 30 / 20", min:10e6, desc:"Cân bằng giữa nhu cầu, mong muốn và tích lũy.",
   jars:[{name:"Thiết yếu",icon:"🏠",pct:50,save:false},{name:"Mong muốn",icon:"🎉",pct:30,save:false},{name:"Tiết kiệm",icon:"💰",pct:20,save:true}]},
  {id:"s6j", name:"6 hũ JARS", min:25e6, desc:"Thu nhập dư dả — tối ưu tích sản và phát triển bản thân.",
   jars:[{name:"Thiết yếu",icon:"🏠",pct:55,save:false},{name:"Tự do tài chính",icon:"📈",pct:10,save:true},{name:"Giáo dục",icon:"📚",pct:10,save:false},{name:"Hưởng thụ",icon:"🎉",pct:10,save:false},{name:"Tiết kiệm dài hạn",icon:"💰",pct:10,save:true},{name:"Cho đi",icon:"❤️",pct:5,save:false}]},
];
function defCats(name){
  const n = (name||"").toLowerCase();
  if(n.includes("thiết yếu")) return ["Ăn uống","Đi lại","Điện nước","Nhà ở","Y tế","Khác"];
  if(n.includes("mong muốn")||n.includes("hưởng thụ")||n.includes("cá nhân")) return ["Cà phê","Mua sắm","Giải trí","Du lịch","Khác"];
  if(n.includes("giáo dục")) return ["Sách","Khóa học","Khác"];
  if(n.includes("tiết kiệm")||n.includes("dự phòng")||n.includes("tự do")) return ["Gửi tiết kiệm","Đầu tư","Khác"];
  if(n.includes("cho đi")) return ["Từ thiện","Biếu tặng","Khác"];
  return ["Khác"];
}

let S = load();
let view = "home";
let mode = "cycle", off = 0, rptN = 6;
let soTab = "acc";
let dayMode = "day", accF = "all", calOff = 0, selDay = null;
let sheet = null, hq = "";
let add = null;
let ob = {step:1, income:"", payday:"1", fw:null, jars:[]};

function load(){
  try{
    const d = JSON.parse(localStorage.getItem(LS));
    if(d && d.jars){
      if(!d.payday) d.payday = 1;
      d.debts = d.debts || [];
      d.fixed = d.fixed || [];
      d.jars.forEach(j=>{ if(!j.cats || !j.cats.length) j.cats = defCats(j.name); });
      if(!d.accounts){
        d.accounts = [{id:"a1",name:"Ví tiền mặt",icon:"👛",init:0},{id:"a2",name:"Ngân hàng",icon:"🏦",init:0}];
        d.txns.forEach(t=>{ if(!t.type) t.type="ex"; if(!t.acc) t.acc="a1"; });
      }
      if(!d.incats) d.incats = ["Lương","Thưởng","Kinh doanh","Khác"];
      if(d.name===undefined) d.name = "";
      if(d.hide===undefined) d.hide = false;
      return d;
    }
  }catch(e){}
  return {setup:false, income:0, payday:1, jars:[], txns:[], debts:[], fixed:[], name:"", hide:false,
    accounts:[{id:"a1",name:"Ví tiền mặt",icon:"👛",init:0},{id:"a2",name:"Ngân hàng",icon:"🏦",init:0}],
    incats:["Lương","Thưởng","Kinh doanh","Khác"]};
}
function save(){ localStorage.setItem(LS, JSON.stringify(S)); }

/* ảnh hóa đơn — IndexedDB */
function idbOpen(){ return new Promise((res,rej)=>{ const q=indexedDB.open("chitieu_img",1); q.onupgradeneeded=()=>q.result.createObjectStore("img"); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); }
function imgPut(id,data){ return idbOpen().then(db=>new Promise((res,rej)=>{ const t=db.transaction("img","readwrite"); t.objectStore("img").put(data,id); t.oncomplete=res; t.onerror=()=>rej(t.error); })); }
function imgGet(id){ return idbOpen().then(db=>new Promise(res=>{ const q=db.transaction("img").objectStore("img").get(id); q.onsuccess=()=>res(q.result||null); q.onerror=()=>res(null); })).catch(()=>null); }
function imgDel(id){ return idbOpen().then(db=>{ db.transaction("img","readwrite").objectStore("img").delete(id); }).catch(()=>{}); }
function imgAll(){ return idbOpen().then(db=>new Promise(res=>{ const st=db.transaction("img").objectStore("img"); const out={}; const q=st.openCursor(); q.onsuccess=()=>{ const c=q.result; if(c){ out[c.key]=c.value; c.continue(); } else res(out); }; q.onerror=()=>res({}); })).catch(()=>({})); }
function loadImgs(){
  document.querySelectorAll("img[data-img]").forEach(el=>{
    imgGet(el.dataset.img).then(d=>{ if(d) el.src=d; });
  });
}
function viewImg(id){
  imgGet(id).then(d=>{
    if(!d){ toast("Không tìm thấy ảnh"); return; }
    const o=document.createElement("div"); o.className="imgview";
    o.innerHTML=`<img src="${d}" alt="hóa đơn"><div class="row"><button class="pill" id="shareimg">↗ Chia sẻ</button><button class="pill" id="closeimg">Đóng</button></div>`;
    o.querySelector("#closeimg").onclick=()=>o.remove();
    o.querySelector("#shareimg").onclick=async(e)=>{
      e.stopPropagation();
      try{
        const blob = await (await fetch(d)).blob();
        const file = new File([blob],"hoadon.jpg",{type:"image/jpeg"});
        if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})) await navigator.share({files:[file]});
        else toast("Thiết bị không hỗ trợ chia sẻ");
      }catch(err){}
    };
    o.onclick=(e)=>{ if(e.target===o||e.target.tagName==="IMG") o.remove(); };
    document.body.appendChild(o);
  });
}

const fmt = n => Math.round(n).toLocaleString("vi-VN") + "₫";
const mask = n => S.hide ? "••••••" : fmt(n);
const fmtShort = n => Math.abs(n) >= 1e6 ? (Math.round(n/1e5)/10).toLocaleString("vi-VN") + " tr" : Math.round(n/1e3).toLocaleString("vi-VN") + "k";
const pad2 = n => String(n).padStart(2,"0");
const dstr = d => d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
function todayStr(){ return dstr(new Date()); }

function cycleRange(o){
  const now = new Date(); const pd = S.payday || 1;
  let s = new Date(now.getFullYear(), now.getMonth(), pd);
  if(now.getDate() < pd) s.setMonth(s.getMonth()-1);
  s.setMonth(s.getMonth() + (o||0));
  const e = new Date(s); e.setMonth(e.getMonth()+1); e.setDate(e.getDate()-1);
  return {s, e};
}
function cycleLabel(r){
  if((S.payday||1)===1) return "tháng "+(r.s.getMonth()+1)+" "+r.s.getFullYear();
  return pad2(r.s.getDate())+"/"+pad2(r.s.getMonth()+1)+" – "+pad2(r.e.getDate())+"/"+pad2(r.e.getMonth()+1);
}
const inRange = (t,r) => t.d >= dstr(r.s) && t.d <= dstr(r.e);
function period(){
  if(mode==="all") return null;
  if(mode==="year"){ const y=new Date().getFullYear()+off; return {s:new Date(y,0,1), e:new Date(y,11,31), label:"năm "+y}; }
  const r = cycleRange(off); r.label = cycleLabel(r); return r;
}
const inPeriod = t => { const p=period(); return !p || inRange(t,p); };
function fixedDue(f,r){
  let d = new Date(r.s.getFullYear(), r.s.getMonth(), Math.min(f.day||1,28));
  if(d < r.s) d.setMonth(d.getMonth()+1);
  return d;
}
const accMatch = t => accF==="all" || t.acc===accF || t.accTo===accF;

function accOf(id){ return S.accounts.find(a=>a.id===id) || {id:id,name:"(đã xóa)",icon:"❓"}; }
function accBal(a){
  let b = Number(a.init)||0;
  S.txns.forEach(t=>{
    if(t.type==="in" && t.acc===a.id) b += t.amt;
    else if((t.type==="ex"||!t.type) && t.acc===a.id) b -= t.amt;
    else if(t.type==="tf"){ if(t.acc===a.id) b -= t.amt; if(t.accTo===a.id) b += t.amt; }
  });
  return b;
}
function jarOf(id){ return S.jars.find(j=>j.id===id) || {name:"Khác",icon:"❓",pct:0,save:false,cats:["Khác"]}; }
function barColor(p){ return p>=100 ? "var(--red)" : p>=80 ? "var(--amber)" : "var(--green)"; }
function streak(){
  const days = new Set(S.txns.map(t=>t.d));
  let n=0; const d=new Date();
  while(days.has(dstr(d))){ n++; d.setDate(d.getDate()-1); }
  return n;
}

function calc(){
  const r = cycleRange(0);
  const mtx = S.txns.filter(t=>t.type!=="tf" && inRange(t,r));
  const ex = mtx.filter(t=>t.type!=="in");
  const byJar = {}, byCat = {};
  ex.forEach(t=>{
    byJar[t.jar]=(byJar[t.jar]||0)+t.amt;
    const c = t.cat || "Khác";
    (byCat[t.jar]=byCat[t.jar]||{})[c]=(byCat[t.jar][c]||0)+t.amt;
  });
  const spendJars = S.jars.filter(j=>!j.save);
  const spendBudget = spendJars.reduce((s,j)=>s+S.income*j.pct/100,0);
  const spentSpend = spendJars.reduce((s,j)=>s+(byJar[j.id]||0),0);
  const now = new Date(); now.setHours(0,0,0,0);
  const daysLeft = Math.max(1, Math.round((r.e - now)/864e5)+1);
  const remain = spendBudget - spentSpend;
  return {r, mtx, byJar, byCat, spendBudget, spentSpend, remain, sts: remain/daysLeft, daysLeft};
}

function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2000);
}

/* ---------- render ---------- */
function render(){
  const app = document.getElementById("app");
  if(!S.setup){ app.innerHTML = vOnboard(); return; }
  let body = "";
  if(view==="home") body = vHome();
  else if(view==="add") body = vAdd();
  else if(view==="history") body = vHistory();
  else if(view==="stats") body = vStats();
  else if(view==="settings") body = vSettings();
  else if(view==="so") body = vSo();
  else if(view==="tf") body = vTransfer();
  else if(view==="addacc") body = vAddAcc();
  app.innerHTML = body + (view==="add" ? "" : vNav()) + vSheet();
  if(view==="add" && add && add.step==="entry"){ const n=document.getElementById("note"); if(n) n.value = add.note; }

}

  if(h<11) return "Chào buổi sáng ☀️";
  if(h<14) return "Chào buổi trưa 🍚";
  if(h<18) return "Chào buổi chiều 🌤️";
  if(h<22) return "Chào buổi tối 🌆";
  return "Chúc ngủ ngon 🌙";
}

function payFixed(id){
  const f = S.fixed.find(x=>x.id===id); if(!f) return;
  S.txns.push({id:Date.now()+"", type:"ex", amt:f.amount, acc:f.acc||S.accounts[0].id, jar:f.jar, cat:"Cố định", note:f.name, fixedId:f.id, d:todayStr()});
  save(); render(); toast("Đã ghi "+f.name+" ✓");
}
function payDebt(id){
  const d = S.debts.find(x=>x.id===id); if(!d) return;
  if(!confirm("Đánh dấu đã trả \""+d.name+"\" ("+fmt(d.amount)+")?\nLưu ý: không tự ghi vào chi tiêu — nếu trả từ ngân sách kỳ này, hãy thêm giao dịch riêng.")) return;
  d.paid = true; d.paidDate = todayStr();
  save(); render(); toast("Đã trả xong ✓");
}
function addDebt(){
  const name = document.getElementById("dname").value.trim();
  const amt = Number(document.getElementById("damt").value.replace(/\D/g,""));
  const due = document.getElementById("ddue").value || null;
  if(!name){ toast("Nhập tên khoản nợ"); return; }
  if(!amt){ toast("Nhập số tiền"); return; }
  S.debts.push({id:"d"+Date.now(), name, amount:amt, due, paid:false});
  save(); render(); toast("Đã thêm ✓");
}
function delDebt(id){
  if(!confirm("Xóa khoản nợ này?")) return;
  S.debts = S.debts.filter(d=>d.id!==id); save(); render(); toast("Đã xóa");
}
function addFixed(){
  const name = document.getElementById("fname").value.trim();
  const amt = Number(document.getElementById("famt").value.replace(/\D/g,""));
  const day = Math.min(28, Math.max(1, Number(document.getElementById("fday").value)||1));
  const jar = document.getElementById("fjar").value;
  const acc = document.getElementById("facc").value;
  if(!name){ toast("Nhập tên khoản chi"); return; }
  if(!amt){ toast("Nhập số tiền"); return; }
  S.fixed.push({id:"f"+Date.now(), name, amount:amt, day, jar, acc});
  save(); render(); toast("Đã thêm ✓");
}
function delFixed(id){
  if(!confirm("Xóa chi phí cố định này? Giao dịch đã ghi vẫn giữ trong lịch sử.")) return;
  S.fixed = S.fixed.filter(f=>f.id!==id); save(); render(); toast("Đã xóa");
}

    : (j ? j.icon+" "+esc(add.cat||j.name) : "🏷️ Danh mục");
  const a = accOf(add.acc);
  const dd = add.d===todayStr() ? "Hôm nay" : add.d.slice(8,10)+"/"+add.d.slice(5,7);
  const keys = ["1","2","3","4","5","6","7","8","9","000","0","⌫"];
  return `<div class="screen" style="padding-bottom:24px">
    <div class="row mb"><button class="pill" onclick="go('home')">Hủy</button></div>
    <div class="photo ${add.img?'':'nophoto'}">
      ${add.img?`<img class="bgimg" src="${add.img}" alt="hóa đơn">`:""}
      <div class="pov">
        <div class="bigamt ${add.type==='in'?'pos':'neg'}">${add.type==='in'?'+':'−'} ${disp} <span class="d">đ</span></div>
        <input type="text" id="note" placeholder="✏️ Thêm chi tiết" oninput="add.note=this.value">
      </div>
    </div>
    <div class="chipsrow">
      <button class="pill sel" onclick="openSheet('cat')">${catLbl} ▾</button>
      <button class="pill" onclick="openSheet('acc')">${a.icon} ${esc(a.name)} ▾</button>
    </div>
    <div class="chipsrow">
      <div class="toggle">
        <button class="${add.type==='ex'?'ex':''}" onclick="setType('ex')">↗ Chi</button>
        <button class="${add.type==='in'?'in':''}" onclick="setType('in')">↙ Thu</button>
      </div>
      <label class="pill">📅 ${dd}<input type="date" value="${add.d}" onchange="add.d=this.value;keepNote();render()" style="position:absolute;inset:0;opacity:0"></label>
    </div>
    <div class="pad">${keys.map(k=>`<button onclick="key('${k}')">${k}</button>`).join("")}</div>
    <div class="saverow">
      <label class="pill grow" style="justify-content:center;padding:14px">📷 ${add.img?"Chụp lại":"Thêm ảnh"}<input type="file" accept="image/*" capture="environment" style="display:none" onchange="attachImg(this)"></label>
      <button class="savebtn" onclick="saveTx()" ${add.amt&&Number(add.amt)>0?"":"disabled"}>✓</button>
    </div>
  </div>`;
}
function setType(t){ keepNote(); add.type=t; add.jar=null; add.cat=null; render(); }
function key(k){
  keepNote();
  if(k==="⌫") add.amt = add.amt.slice(0,-1);
  else if(k==="000"){ if(add.amt && add.amt.length<=9) add.amt += "000"; }
  else if(add.amt.length<12 && !(k==="0"&&!add.amt)) add.amt += k;
  render();
}
function keepNote(){ const n=document.getElementById("note"); if(n && add) add.note=n.value; }
function attachImg(inp){
  const f = inp.files[0]; if(!f) return;
  const img = new Image();
  img.onload = ()=>{
    const mx = 900, sc = Math.min(1, mx/Math.max(img.width,img.height));
    const cv = document.createElement("canvas");
    cv.width = Math.round(img.width*sc); cv.height = Math.round(img.height*sc);
    cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
    add.img = cv.toDataURL("image/jpeg",0.72);
    URL.revokeObjectURL(img.src);
    add.step = "entry";
    keepNote(); render();
  };
  img.onerror = ()=>{ URL.revokeObjectURL(img.src); toast("Không đọc được ảnh"); };
  img.src = URL.createObjectURL(f);
}
function saveTx(){
  keepNote();
  const amt = Number(add.amt); if(!amt) return;
  const tid = Date.now()+"";
  const t = {id:tid, type:add.type, amt, acc:add.acc, note:add.note.trim(), d:add.d||todayStr(), hasImg:!!add.img};
  if(add.type==="ex"){
    const sj = S.jars.filter(x=>!x.save)[0] || S.jars[0];
    t.jar = add.jar || (sj && sj.id);
    t.cat = add.cat || "Khác";
  } else t.cat = add.cat || "Khác";
  S.txns.push(t);
  if(add.img) imgPut(tid, add.img);
  save();
  let msg = "Đã lưu ✓";
  if(t.type==="ex" && t.jar){
    const j = jarOf(t.jar);
    const bud = S.income*j.pct/100;
    const r = cycleRange(0);
    const sp = S.txns.filter(x=>(x.type==="ex"||!x.type) && x.jar===j.id && inRange(x,r)).reduce((s,x)=>s+x.amt,0);
    if(bud>0 && sp>bud) msg = "⚠️ Vượt ngân sách hũ "+j.name+"!";
    else if(bud>0 && sp>bud*0.8) msg = "Đã dùng "+Math.round(sp/bud*100)+"% hũ "+j.name;
  }
  selDay = t.d;
  view="home"; render(); toast(msg);
}

/* ---------- history ---------- */
function txRow(t){
  if(t.type==="tf"){
    return `<div class="tx">
      <span class="ico">⇆</span>
      <div class="grow"><div class="n">${esc(accOf(t.acc).name)} → ${esc(accOf(t.accTo).name)}</div><div class="s">Chuyển tiền · ${t.d.slice(8,10)}/${t.d.slice(5,7)}</div></div>
      <span class="a">${mask(t.amt)}</span>
      <button class="del" onclick="delTx('${t.id}')" aria-label="Xóa">✕</button>
    </div>`;
  }
  const isIn = t.type==="in";
  const j = isIn ? null : jarOf(t.jar);
  const a = accOf(t.acc);
  const sub = (isIn ? "Thu nhập"+(t.cat&&t.cat!=="Khác"?" · "+esc(t.cat):"") : esc(j.name)+(t.cat&&t.cat!=="Khác"?" · "+esc(t.cat):"")) + " · " + esc(a.name);
  const lead = t.hasImg
    ? `<img class="thumb" data-img="${t.id}" onclick="viewImg('${t.id}')" alt="hóa đơn" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==">`
    : `<span class="ico">${isIn?"💵":j.icon}</span>`;
  return `<div class="tx">
    ${lead}
    <div class="grow"><div class="n">${esc(t.note)||esc(t.cat|| (isIn?"Thu nhập":j.name))}</div><div class="s">${sub}</div></div>
    <span class="a ${isIn?'pos':''}">${isIn?"+":"−"}${mask(t.amt)}</span>
    <button class="del" onclick="delTx('${t.id}')" aria-label="Xóa">✕</button>
  </div>`;
}
function hList(){
  const q = hq.trim().toLowerCase();
  const match = t => {
    if(!q) return true;
    const j = jarOf(t.jar);
    return (t.note||"").toLowerCase().includes(q) || j.name.toLowerCase().includes(q)
      || (t.cat||"").toLowerCase().includes(q) || accOf(t.acc).name.toLowerCase().includes(q)
      || String(t.amt).includes(q.replace(/\D/g,"")||"~");
  };
  const groups = {};
  [...S.txns].filter(match).sort((a,b)=>b.d.localeCompare(a.d)||b.id.localeCompare(a.id)).forEach(t=>{
    (groups[t.d]=groups[t.d]||[]).push(t);
  });
  const days = Object.keys(groups);
  return days.length ? days.map(d=>{
    const list = groups[d];
    const tot = list.filter(t=>t.type!=="tf").reduce((s,t)=>s+(t.type==="in"?t.amt:-t.amt),0);
    const [y,m,dd] = d.split("-");
    return `<div class="day"><div class="dh"><span>${dd}/${m}/${y}${d===todayStr()?" · hôm nay":""}</span><span class="${tot<0?'':'pos'}">${tot>0?"+":""}${mask(tot)}</span></div>
      ${list.map(txRow).join("")}</div>`;
  }).join("") : `<div class="center muted" style="padding:60px 0">${q ? "Không tìm thấy giao dịch nào." : "Chưa có giao dịch nào.<br>Bấm nút + để ghi khoản chi đầu tiên."}</div>`;
}
function vHistory(){
  return `<div class="screen">
    <h1 class="row"><button class="back" onclick="go('home')">‹</button>Lịch sử</h1>
    <div class="mt"></div>
    <input type="text" placeholder="🔍 Tìm theo ghi chú, hũ, danh mục, tài khoản..." value="${esc(hq)}"
      oninput="hq=this.value;document.getElementById('hlist').innerHTML=hList();loadImgs()">
    <div class="mt"></div>
    <div id="hlist">${hList()}</div>
  </div>`;
}
function delTx(id){
  if(!confirm("Xóa giao dịch này?")) return;
  S.txns = S.txns.filter(t=>t.id!==id); imgDel(id); save(); render(); toast("Đã xóa");
}

/* ---------- stats ---------- */
function vStats(){
  const c = calc();
  const r = c.r;
  const fIn = S.txns.filter(t=>t.type==="in" && inRange(t,r) && accMatch(t)).reduce((s,t)=>s+t.amt,0);
  const fEx = S.txns.filter(t=>(t.type==="ex"||!t.type) && inRange(t,r) && accMatch(t)).reduce((s,t)=>s+t.amt,0);
  const groups = [];
  for(let i=rptN-1;i>=0;i--){
    const rr = cycleRange(-i);
    const inc = S.txns.filter(t=>t.type==="in" && inRange(t,rr) && accMatch(t)).reduce((s,t)=>s+t.amt,0);
    const exp = S.txns.filter(t=>(t.type==="ex"||!t.type) && inRange(t,rr) && accMatch(t)).reduce((s,t)=>s+t.amt,0);
    groups.push({lb:"T"+(rr.s.getMonth()+1), inc, exp});
  }
  const max = Math.max(...groups.map(g=>Math.max(g.inc,g.exp)), 1);
  const avg = groups.reduce((s,g)=>s+g.exp,0)/rptN;
  const byJarF = {}, byCatF = {};
  S.txns.filter(t=>(t.type==="ex"||!t.type) && inRange(t,r) && accMatch(t)).forEach(t=>{
    byJarF[t.jar]=(byJarF[t.jar]||0)+t.amt;
    const cc = t.cat || "Khác";
    (byCatF[t.jar]=byCatF[t.jar]||{})[cc]=(byCatF[t.jar][cc]||0)+t.amt;
  });
  const jarsHtml = S.jars.map(j=>{
    const bud=S.income*j.pct/100, sp=byJarF[j.id]||0, p=bud>0?sp/bud*100:0;
    const cats = Object.entries(byCatF[j.id]||{}).sort((a,b)=>b[1]-a[1])
      .map(([cat,v])=>`<div class="catline"><span>· ${esc(cat)}</span><span>${mask(v)}</span></div>`).join("");
    return `<div class="jar"><div class="top"><span class="nm">${j.icon} ${esc(j.name)}</span>
      <span>${mask(sp)} <span class="tiny">(${Math.round(p)}%)</span></span></div>
      <div class="bar"><i style="width:${Math.min(100,p)}%;background:${j.save?'var(--blue)':barColor(p)}"></i></div>
      ${cats}</div>`;
  }).join("");
  return `<div class="screen"><h1>Báo cáo — ${cycleLabel(r)}</h1>
    <div class="fchips">
      <button class="${accF==='all'?'on':''}" onclick="accF='all';render()">Tất cả</button>
      ${S.accounts.map(a=>`<button class="${accF===a.id?'on':''}" onclick="accF='${a.id}';render()">${a.icon} ${esc(a.name)}</button>`).join("")}
    </div>
    <div class="ct2 mb">
      <div class="ct"><div class="ic2 in">↙</div><div><div class="v">${mask(fIn)}</div><div class="l">Thu nhập</div></div></div>
      <div class="ct hl"><div class="ic2 ex">↗</div><div><div class="v">${mask(fEx)}</div><div class="l">Chi tiêu</div></div></div>
    </div>
    <div class="card mb"><div class="tiny">Số dư kỳ này (thu − chi)</div>
    <div style="font-size:24px;font-weight:800" class="${fIn-fEx<0?'neg':'pos'}">${fIn-fEx>=0?"+":""}${mask(fIn-fEx)}</div></div>
    <div class="card">
      <div class="row"><div class="grow">
        <div style="font-weight:700">So sánh theo kỳ</div>
        <div class="tiny">Trung bình chi tiêu · ${mask(avg)}</div></div>
        <div class="ptabs" style="margin:0;padding:3px">${[3,6,9].map(n=>`<button style="padding:6px 12px" class="${rptN===n?'on':''}" onclick="rptN=${n};render()">${n} kỳ</button>`).join("")}</div>
      </div>
      <div class="cmp">${groups.map(g=>`<div class="g">
        <div class="bars">
          <div class="bi" style="height:${Math.max(3,g.inc/max*92)}px"></div>
          <div class="be" style="height:${Math.max(3,g.exp/max*92)}px"></div>
        </div>
        <div class="tiny" style="margin-top:5px">${g.lb}</div>
      </div>`).join("")}</div>
      <div class="row tiny" style="justify-content:center;gap:16px;margin-top:8px">
        <span><span style="color:var(--green)">●</span> Thu nhập</span>
        <span><span style="color:var(--red)">●</span> Chi tiêu</span>
      </div>
    </div>
    <h2>Danh mục</h2>${jarsHtml}
    <div class="tiny center mt">Ngân sách chi tiêu: ${fmt(c.spendBudget)} · Đã chi toàn bộ: ${mask(c.spentSpend)}</div>
  </div>`;
}

  </div>`;
}
function setCats(i,v){
  const cats = v.split(",").map(s=>s.trim()).filter(Boolean);
  S.jars[i].cats = cats.length ? cats : ["Khác"];
}
function setInCats(v){
  const cats = v.split(",").map(s=>s.trim()).filter(Boolean);
  S.incats = cats.length ? cats : ["Khác"];
}
function delAcc(i){
  if(S.accounts.length<=1){ toast("Phải có ít nhất 1 tài khoản"); return; }
  if(!confirm("Xóa tài khoản \""+S.accounts[i].name+"\"? Giao dịch cũ vẫn giữ trong lịch sử.")) return;
  S.accounts.splice(i,1); if(accF!=="all") accF="all"; save(); render();
}
function saveSettings(){
  S.name = document.getElementById("uname").value.trim();
  const inc = Number(document.getElementById("inc").value.replace(/\D/g,""));
  if(inc>0) S.income = inc;
  S.payday = Math.min(28, Math.max(1, Number(document.getElementById("payday").value)||1));
  const tot = S.jars.reduce((s,j)=>s+Number(j.pct||0),0);
  save(); render();
  toast(tot===100 ? "Đã lưu ✓" : "Đã lưu — lưu ý tổng % là "+tot+"%");
}
function addJar(){ S.jars.push({id:"j"+Date.now(), name:"Hũ mới", icon:"🫙", pct:0, save:false, cats:["Khác"]}); render(); }
function delJar(i){ if(confirm("Xóa hũ \""+S.jars[i].name+"\"? Giao dịch cũ của hũ vẫn giữ trong lịch sử.")){ S.jars.splice(i,1); save(); render(); } }
function exportData(){
  imgAll().then(imgs=>{
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify({...S, _images:imgs},null,2)],{type:"application/json"}));
    a.download = "chitieu-backup-"+todayStr()+".json"; a.click();
  });
}
function importData(inp){
  const f = inp.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const d = JSON.parse(r.result);
      if(!(d.jars && d.txns)){ toast("File không hợp lệ"); return; }
      const imgs = d._images || {}; delete d._images;
      localStorage.setItem(LS, JSON.stringify(d));
      Promise.all(Object.keys(imgs).map(k=>imgPut(k, imgs[k]))).finally(()=>{
        S = load(); render(); toast("Đã nhập dữ liệu ✓");
      });
    }catch(e){ toast("File không hợp lệ"); }
  };
  r.readAsText(f);
}
function resetAll(){ if(confirm("Xóa TOÀN BỘ dữ liệu? Không thể hoàn tác.")){ localStorage.removeItem(LS); S=load(); ob={step:1,income:"",payday:"1",fw:null,jars:[]}; view="home"; selDay=null; render(); } }

/* ---------- onboarding ---------- */
function vOnboard(){
  if(ob.step===1){
    return `<div class="ob">
      <h1>Chào bạn 👋</h1>
      <p class="muted">Quản lý chi tiêu theo hũ, cá nhân hóa theo thu nhập của bạn. Bắt đầu nhé.</p>
      <h2>Tên của bạn?</h2>
      <input type="text" id="obname" placeholder="Ví dụ: Trí" value="">
      <h2>Thu nhập trung bình mỗi tháng?</h2>
      <input type="tel" id="obinc" inputmode="numeric" placeholder="Ví dụ: 15000000" value="${ob.income}">
      <h2>Ngày nhận lương hàng tháng?</h2>
      <input type="number" id="obpd" min="1" max="28" value="${ob.payday}">
      <p class="tiny mt">Chu kỳ ngân sách tính từ ngày nhận lương. Để 1 nếu muốn tính theo tháng dương lịch.</p>
      <div class="grow"></div>
      <button class="btn mt" onclick="obNext1()">Tiếp tục</button>
    </div>`;
  }
  if(ob.step===2){
    const inc = Number(ob.income);
    const sug = inc<10e6 ? "s70" : inc<=25e6 ? "s50" : "s6j";
    return `<div class="ob">
      <h1>Chọn khung phân bổ</h1>
      <p class="muted mb">Với thu nhập ${fmt(inc)}, khung được đề xuất đã đánh dấu — bạn vẫn chỉnh được từng % ở bước sau.</p>
      ${FW.map(f=>`<button class="fw ${ob.fw===f.id?'sel':''}" onclick="obPickFw('${f.id}')">
        <span class="n">${f.name}</span>${f.id===sug?'<span class="badge">Đề xuất</span>':''}
        <div class="d">${f.desc}</div>
        <div class="tiny mt">${f.jars.map(j=>j.icon+" "+j.name+" "+j.pct+"%").join(" · ")}</div>
      </button>`).join("")}
      <div class="grow"></div>
      <button class="btn" onclick="obNext2()" ${ob.fw?"":"disabled"}>Tiếp tục</button>
    </div>`;
  }
  const inc = Number(ob.income);
  const tot = ob.jars.reduce((s,j)=>s+Number(j.pct||0),0);
  return `<div class="ob">
    <h1>Tinh chỉnh định mức</h1>
    <p class="muted mb">Kéo % theo thực tế của bạn — tổng nên bằng 100%. Hiện tại: <b style="color:${tot===100?'var(--green)':'var(--red)'}">${tot}%</b></p>
    ${ob.jars.map((j,i)=>`<div class="srow">
      <span style="font-size:20px">${j.icon}</span>
      <span class="grow" style="font-size:14px">${esc(j.name)}<br><span class="tiny">${fmt(inc*j.pct/100)}/tháng</span></span>
      <input class="pct" type="number" value="${j.pct}" onchange="ob.jars[${i}].pct=Number(this.value)||0;render()">
    </div>`).join("")}
    <div class="grow"></div>
    <button class="btn" onclick="obFinish()" ${tot===100?"":"disabled"}>Hoàn tất — bắt đầu dùng</button>
  </div>`;
}
function obNext1(){
  const v = Number(document.getElementById("obinc").value.replace(/\D/g,""));
  if(!v || v<1e6){ toast("Nhập thu nhập hợp lệ (VNĐ)"); return; }
  ob.name = document.getElementById("obname").value.trim();
  ob.income = String(v);
  ob.payday = String(Math.min(28, Math.max(1, Number(document.getElementById("obpd").value)||1)));
  ob.step=2; render();
}
function obPickFw(id){ ob.fw=id; ob.jars = FW.find(f=>f.id===id).jars.map((j,i)=>({...j, id:"j"+i, cats:defCats(j.name)})); render(); }
function obNext2(){ ob.step=3; render(); }
function obFinish(){
  S.income = Number(ob.income); S.payday = Number(ob.payday)||1;
  S.name = ob.name || "";
  S.jars = ob.jars; S.setup = true;
  S.txns = S.txns||[]; S.debts = S.debts||[]; S.fixed = S.fixed||[];
  save(); view="home"; render(); toast("Sẵn sàng! Bấm + để ghi khoản chi đầu tiên");
}

function esc(s){ return String(s??"").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

render();
if("serviceWorker" in navigator && location.protocol!=="file:") navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
